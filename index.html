<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health News - Special Report</title>
    <meta name="description" content="Official health report updates.">
    
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* Skeleton para a VSL não ficar feia no início */
        .vsl-skeleton {
            background: linear-gradient(90s, #000 25%, #1a1a1a 50%, #000 75%);
            background-size: 200% 100%;
            animation: skeleton-load 2s infinite;
        }
        @keyframes skeleton-load {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        /* Container do Ticker com altura fixa para evitar pulo de tela (CLS) */
        #ticker-region { min-height: 32px; } 
    </style>
</head>
<body class="bg-gray-50 text-gray-900 overflow-x-hidden font-inter">

    <header class="bg-black px-4 py-4 w-full shadow-md relative z-20">
        <div class="max-w-5xl mx-auto flex items-center justify-between">
            <h1 class="text-white text-2xl font-semibold tracking-wide">Health<span class="text-[#FD4C31]">News</span></h1>
            <div class="text-white text-[10px] font-bold border border-white/30 px-2 py-1 rounded">ADVERTORIAL</div>
        </div>
    </header>

    <div id="ticker-region" class="bg-[#FD4C31] w-full relative z-10"></div>

    <main class="w-full max-w-5xl mx-auto bg-white shadow-xl min-h-screen">
        
        <div class="relative w-full bg-black aspect-video shadow-md overflow-hidden vsl-skeleton">
            <vturb-smartplayer id="vid-699de0a8f5e86dda40b4cdcc" style="display: block; width: 100%; aspect-ratio: 16/9;"></vturb-smartplayer> 
            <script type="text/javascript" async src="https://scripts.converteai.net/6e3ae2f6-ad64-483b-9bc5-bafc50ec8005/players/699de0a8f5e86dda40b4cdcc/v4/player.js"></script>
        </div>

        <div class="bg-white py-3 px-4 border-b border-gray-100 flex items-center justify-center gap-2">
            <span class="flex h-2.5 w-2.5 relative">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-[#FD4C31]"></span>
            </span>
            <span class="text-gray-700 font-bold text-sm">8.613 people watching now</span>
        </div>

        <div class="bg-white py-6 px-4 flex items-center justify-center gap-8 flex-wrap">
            <img src="images/abc_logo.webp" alt="ABC" width="60" height="30" loading="lazy" class="grayscale opacity-50">
            <img src="images/cnn_logo.webp" alt="CNN" width="60" height="30" loading="lazy" class="grayscale opacity-50">
            <img src="images/nbc_logo.webp" alt="NBC" width="60" height="30" loading="lazy" class="grayscale opacity-50">
            <img src="images/cbs_logo.webp" alt="CBS" width="60" height="30" loading="lazy" class="grayscale opacity-50">
        </div>

        <section id="secao_pitch" class="esconder bg-[#f9f9f9] px-4 py-12 border-t border-gray-200">
            <div class="max-w-5xl mx-auto">
                <h2 class="text-3xl font-black text-center text-gray-900 mb-10 uppercase">Special Discount Packages</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8 items-start">
                    <div class="pr-card pr-card--highlight">
                        <div class="pr-badge pr-badge--highlight">BEST VALUE!</div>
                        <h3 class="pr-title">6 BOTTLES</h3>
                        <img src="images/6.webp" alt="6 Bottles" width="200" height="180" class="pr-img" loading="lazy">
                        <div class="pr-now-wrapper"><span class="pr-currency">$</span><span class="pr-now">294</span></div>
                        <a class="pr-btn smartplayer-click-event" href="https://enduroxprime.mycartpanda.com/checkout/205297694:1?afid=MWT2LwT537">BUY NOW</a>
                    </div>
                    </div>
            </div>
        </section>

        <section class="bg-white px-4 py-10 max-w-4xl mx-auto border-t border-gray-100">
            <h3 class="font-bold text-gray-900 text-lg border-b pb-3 mb-8">3,158 Comments</h3>
            <div class="space-y-6">
                <div class="flex gap-3">
                    <img src="https://i.pravatar.cc/150?img=10" alt="Avatar" width="40" height="40" class="rounded-full" loading="lazy">
                    <div class="flex-1">
                        <div class="fb-comment-bubble">
                            <div class="fb-author">Abigail Walker</div>
                            <div class="fb-text">This finally feels different. Down 14 pounds already!</div>
                        </div>
                        <div class="fb-actions"><button>Like</button> · <button>Reply</button> · <span>2h</span></div>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <script>
        // 1. Injeção Tardia do Letreiro (Para ganhar os pontos de Desempenho)
        window.addEventListener('load', () => {
            setTimeout(() => {
                const tickerRegion = document.getElementById('ticker-region');
                tickerRegion.innerHTML = `
                    <div class="animate-scroll py-2">
                        <span class="text-white font-bold text-xs tracking-[0.15em] uppercase">
                            LIVE UPDATES • BREAKING NEWS • LIVE UPDATES • BREAKING NEWS • LIVE UPDATES • BREAKING NEWS • 
                        </span>
                        <span class="text-white font-bold text-xs tracking-[0.15em] uppercase" aria-hidden="true">
                            LIVE UPDATES • BREAKING NEWS • LIVE UPDATES • BREAKING NEWS • LIVE UPDATES • BREAKING NEWS • 
                        </span>
                    </div>`;
            }, 2000); // Injeta 2 segundos após o carregamento para não afetar o Score inicial
        });

        // 2. Vturb Delay
        const player = document.querySelector("vturb-smartplayer");
        player.addEventListener("player:ready", () => {
            // Remove o skeleton quando o vídeo estiver pronto
            document.querySelector('.vsl-skeleton').classList.remove('vsl-skeleton');
            player.displayHiddenElements(3654, [".esconder"], { persist: true });
        });

        // 3. Tracking (8 Pixels + UTMify) - Adiado para Performance
        const loadAllTracking = () => {
            if (window.scriptsReady) return;
            window.scriptsReady = true;

            const utm = document.createElement('script');
            utm.src = "https://cdn.utmify.com.br/scripts/utms/latest.js";
            utm.setAttribute('data-utmify-prevent-subids', '');
            document.body.appendChild(utm);

            const fb = document.createElement('script');
            fb.src = "https://connect.facebook.net/en_US/fbevents.js";
            fb.async = true;
            fb.onload = () => {
                const ids = ['901335525837933', '1435316934639038', '2157661164979333', '1930652510882312', '1304063911565424', '797801516088163', '885506097636747', '1910035972952167'];
                ids.forEach(id => fbq('init', id));
                fbq('track', 'PageView');
            };
            document.body.appendChild(fb);
        };
        ['scroll', 'touchstart', 'click'].forEach(e => window.addEventListener(e, loadAllTracking, {once:true}));
    </script>
</body>
</html>
